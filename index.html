<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>TRPG Chat</title>
<link rel="stylesheet" href="styles/all.css">
</head>
<body>

<div class="chat-container">

  <div id="chat-messages"></div>

  <div class="chat-input-wrap">
    <button class="chat-attach-btn" onclick="document.getElementById('chat-img-input').click()">+</button>
    <input type="file" id="chat-img-input" accept="image/png,image/jpeg,image/gif" multiple style="display:none" onchange="handleChatImageUpload(this)">

    <div class="chat-composer-stack">
      <div class="chat-image-queue" id="chat-image-queue" style="display:none">
        <div class="chat-image-queue-head">
          <div>
            <div class="chat-image-queue-title">첨부된 이미지</div>
            <div class="chat-image-queue-help">최대 4장 · 삭제 · 순서 변경</div>
          </div>
          <label>
            <input type="checkbox" id="chat-image-wide-toggle" onchange="togglePendingChatImageWide(this.checked)">
            가로폭 채우기
          </label>
        </div>
        <div id="chat-image-preview-list"></div>
      </div>

      <textarea id="chat-input" placeholder="메시지 입력" onkeydown="chatKeydown(event)"></textarea>
    </div>

    <button onclick="sendChat()">전송</button>
  </div>

</div>

<script src="src/v1-core.js"></script>
</body>
</html>
